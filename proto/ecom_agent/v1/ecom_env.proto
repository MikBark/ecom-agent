syntax = "proto3";

package ecom_agent.v1;

option go_package = "ecom_agent/v1;ecom_agentv1";

// EcomEnv is the Playground surface: agent-working tools over an isolated
// per-playground filesystem. Mirrors the bitgn EcomRuntime env-tool subset.
// Deliberately excludes any benchmark-specific RPC (no `answer`, no scoring).
service EcomEnv {
  rpc Read(ReadRequest) returns (ReadResponse);
  rpc ReadSilent(ReadRequest) returns (ReadResponse);
  rpc List(ListRequest) returns (ListResponse);
  rpc Tree(TreeRequest) returns (TreeResponse);
  rpc Find(FindRequest) returns (FindResponse);
  rpc Search(SearchRequest) returns (SearchResponse);
  rpc Stat(StatRequest) returns (StatResponse);
  rpc Exec(ExecRequest) returns (ExecResponse);
  rpc Write(WriteRequest) returns (WriteResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  rpc Context(ContextRequest) returns (ContextResponse);
}

enum NodeKind {
  NODE_KIND_UNSPECIFIED = 0;
  NODE_KIND_FILE = 1;
  NODE_KIND_DIR = 2;
}

message Entry {
  string name = 1;
  string path = 2;
  NodeKind kind = 3;
  string content_type = 4;
  repeated Entry children = 5;
}

message ReadRequest {
  string playground_id = 1;
  string path = 2;
  bool number = 3;
  int32 start_line = 4;
  int32 end_line = 5;
}

message ReadResponse {
  string path = 1;
  string content_type = 2;
  string content = 3;
  string sha256 = 4;
  bool truncated = 5;
}

message ListRequest {
  string playground_id = 1;
  string path = 2;
}

message ListResponse {
  string path = 1;
  repeated Entry entries = 2;
}

message TreeRequest {
  string playground_id = 1;
  string root = 2;
  int32 level = 3;
}

message TreeResponse {
  Entry root = 1;
  bool truncated = 2;
}

message FindRequest {
  string playground_id = 1;
  string root = 2;
  string name = 3;
  NodeKind kind = 4;
  int32 limit = 5;
}

message FindResponse {
  repeated string paths = 1;
  bool truncated = 2;
}

message SearchRequest {
  string playground_id = 1;
  string root = 2;
  string pattern = 3;
  int32 limit = 4;
}

message Match {
  string path = 1;
  int32 line = 2;
  string line_text = 3;
}

message SearchResponse {
  repeated Match matches = 1;
  bool truncated = 2;
}

message StatRequest {
  string playground_id = 1;
  string path = 2;
}

message StatResponse {
  string path = 1;
  NodeKind kind = 2;
  string content_type = 3;
  bool writable = 4;
}

message ExecRequest {
  string playground_id = 1;
  string path = 2;
  repeated string args = 3;
  string stdin = 4;
}

message ExecResponse {
  int32 exit_code = 1;
  string stdout = 2;
  string stderr = 3;
}

message WriteRequest {
  string playground_id = 1;
  string path = 2;
  string content = 3;
  string if_match_sha256 = 4;
}

message WriteResponse {
  string path = 1;
}

message DeleteRequest {
  string playground_id = 1;
  string path = 2;
}

message DeleteResponse {}

message ContextRequest {
  string playground_id = 1;
}

message ContextResponse {
  string content = 1;
}
