name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run python scripts/check_string_line_continuations.py src tests scripts

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
      - name: Authenticate to Buf Schema Registry
        run: |
          printf 'machine buf.build\n  login %s\n  password %s\n' \
            "${{ secrets.BUF_BUILD_USER }}" "${{ secrets.BUF_BUILD_TOKEN }}" > ~/.netrc
          chmod 600 ~/.netrc
      - run: make proto
      - run: uv run mypy src

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
      - name: Authenticate to Buf Schema Registry
        run: |
          printf 'machine buf.build\n  login %s\n  password %s\n' \
            "${{ secrets.BUF_BUILD_USER }}" "${{ secrets.BUF_BUILD_TOKEN }}" > ~/.netrc
          chmod 600 ~/.netrc
      - run: make proto
      - run: uv run pytest --cov=ecom_agent --cov-report=term-missing --cov-fail-under=75

  build-push:
    needs: [lint, typecheck, test]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/ecom-agent
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          secrets: |
            buf_netrc=machine buf.build login ${{ secrets.BUF_BUILD_USER }} password ${{ secrets.BUF_BUILD_TOKEN }}

  publish-stubs:
    needs: [lint, typecheck, test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
      - run: make proto-stubs
      - name: Publish ecom-agent-stubs to PyPI
        working-directory: stub-package
        run: |
          uv build
          uv publish --token "${{ secrets.PYPI_TOKEN }}"
